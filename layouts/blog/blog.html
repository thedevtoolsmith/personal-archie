{{ define "main" }}
<h1 class="page-title">Blog</h1>
<ul class="posts blog-posts">
    {{- range .Data.Pages -}} {{- if (not (in (.Site.Params.excludedTypes | default (slice "page")) .Type)) -}}
    <section class="list-item blog-list-item">
        <div class="post-header">
            <h1 class="title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h1>
            <time>{{ dateFormat "2 Jan 2006" .Date }}{{ if .Draft }} <span class="draft-label">DRAFT</span>{{ end }}</time>
        </div>
    </section>
    {{- end -}} {{- end -}}
</ul>
{{ end }}
